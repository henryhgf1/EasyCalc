<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calculadora</title>

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="calculator">
      <div class="history" id="history">
        <div class="history-header">
          <span class="history-title">Histórico</span>
          <div class="history-controls">
            <button type="button" class="hist-btn" id="histToggle">⌃</button>
            <button type="button" class="hist-btn" id="histClear">✕</button>
          </div>
        </div>
        <div class="history-entries" id="historyEntries"></div>
      </div>
      <input type="text" id="display" readonly inputmode="numeric" />

      <div class="buttons">
        <button type="button" class="number">7</button>
        <button type="button" class="number">8</button>
        <button type="button" class="number">9</button>
        <button type="button" class="operator">/</button>

        <button type="button" class="number">4</button>
        <button type="button" class="number">5</button>
        <button type="button" class="number">6</button>
        <button type="button" class="operator">*</button>

        <button type="button" class="number">1</button>
        <button type="button" class="number">2</button>
        <button type="button" class="number">3</button>
        <button type="button" class="operator">-</button>

        <button type="button" class="number">0</button>
        <button type="button" class="number">.</button>
        <button type="button" class="operator">%</button>
        <button type="button" class="operator">+</button>

        <button type="button" class="backspace">⌫</button>
        <button type="button" class="clear">C</button>
        <button type="button" class="sign">±</button>
        <button type="button" class="equals">=</button>
      </div>
    </div>
  </body>

  <script src="assets/js/calculator.js"></script>
  <script src="assets/js/script.js"></script>
</html>
